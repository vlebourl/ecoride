name: Auto-bump version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip if the commit is already a version bump (prevent infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Extract type from conventional commit (first line)
          TYPE=$(echo "$MSG" | head -1 | grep -oP '^(feat|fix|perf|refactor)' || echo "")

          if [ "$TYPE" = "feat" ]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi
          echo "Commit type: $TYPE → bump: $(cat $GITHUB_OUTPUT | grep type= | cut -d= -f2)"

      - name: Bump package.json version
        if: steps.bump.outputs.type != 'none'
        run: |
          BUMP="${{ steps.bump.outputs.type }}"
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping: $CURRENT → $NEW ($BUMP)"

          # Update package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $NEW"
          git push

  deploy:
    name: Deploy to Coolify
    needs: bump
    if: needs.bump.result == 'success'
    runs-on: homelab-runner
    steps:
      - name: Trigger Coolify deploy
        run: |
          RESPONSE=$(curl -s -f -X GET \
            "http://localhost:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "$RESPONSE"
          DEPLOY_UUID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['deployments'][0]['deployment_uuid'])")
          echo "deploy_uuid=$DEPLOY_UUID" >> $GITHUB_ENV

      - name: Wait and verify
        run: |
          sleep 90
          STATUS=$(curl -s \
            "http://localhost:8000/api/v1/deployments/${{ env.deploy_uuid }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('status'))")
          echo "Status: $STATUS"
          [ "$STATUS" = "finished" ] || exit 1
