name: Auto-bump version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip if the commit is already a version bump (prevent infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT with repo scope (owner token) — GITHUB_TOKEN cannot push directly
          # to a protected branch. Owner token bypasses branch protection when
          # enforce_admins is false.
          token: ${{ secrets.GH_PAT }}

      - name: Determine bump type from commit message
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Check for BREAKING CHANGE in commit body or footer (major bump)
          if echo "$COMMIT_MSG" | grep -qP '(BREAKING CHANGE|BREAKING-CHANGE)'; then
            echo "type=major" >> $GITHUB_OUTPUT
          else
            # Extract type from conventional commit (first line only)
            TYPE=$(echo "$COMMIT_MSG" | head -1 | grep -oP '^(feat|fix|perf|refactor)' || echo "")

            if [ "$TYPE" = "feat" ]; then
              echo "type=minor" >> $GITHUB_OUTPUT
            elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ] || [ "$TYPE" = "refactor" ]; then
              echo "type=patch" >> $GITHUB_OUTPUT
            else
              echo "type=none" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Commit type: $(cat $GITHUB_OUTPUT | grep type= | cut -d= -f2)"

      - name: Bump package.json version
        if: steps.bump.outputs.type != 'none'
        run: |
          BUMP="${{ steps.bump.outputs.type }}"
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping: $CURRENT → $NEW ($BUMP)"

          # Update package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $NEW"
          git push

  deploy:
    name: Deploy to Coolify
    needs: bump
    if: needs.bump.result == 'success'
    runs-on: homelab-runner
    steps:
      - name: Trigger Coolify deploy
        run: |
          RESPONSE=$(curl -s -f -X GET \
            "http://localhost:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "$RESPONSE"
          DEPLOY_UUID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['deployments'][0]['deployment_uuid'])")
          echo "deploy_uuid=$DEPLOY_UUID" >> $GITHUB_ENV

      - name: Wait and verify
        run: |
          echo "Waiting for deployment ${{ env.deploy_uuid }} to finish..."
          for i in $(seq 1 24); do
            sleep 15
            STATUS=$(curl -s \
              "http://localhost:8000/api/v1/deployments/${{ env.deploy_uuid }}" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('status'))")
            echo "[$((i * 15))s] Status: $STATUS"
            [ "$STATUS" = "finished" ] && exit 0
            [ "$STATUS" = "failed" ] && echo "Deployment failed!" && exit 1
          done
          echo "Timeout: deployment still $STATUS after 360s"
          exit 1
