name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, feat/ci-avancee]

jobs:
  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run format:check

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd client && bunx vitest run
      - run: cd server && bun run test:coverage

  smoke:
    name: Smoke test (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd client && bun run build
        env:
          # Optional: add SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT as GitHub
          # Actions secrets to upload source maps to Sentry on CI builds.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - run: cd client && bunx playwright install chromium --with-deps
      - run: cd client && bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/test-results/
          retention-days: 7

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build
        run: (cd client && bun run build)

      - name: Run Lighthouse CI
        continue-on-error: true
        run: npx --yes @lhci/cli autorun

      - name: Parse scores and write comment
        id: report
        run: |
          REPORT=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No Lighthouse report found — collection may have failed." >&2
            exit 0
          fi

          PERF=$(jq '((.categories.performance.score // 0) * 100 | round)' "$REPORT")
          A11Y=$(jq '((.categories.accessibility.score // 0) * 100 | round)' "$REPORT")
          BP=$(jq '((.categories["best-practices"].score // 0) * 100 | round)' "$REPORT")
          SEO=$(jq '((.categories.seo.score // 0) * 100 | round)' "$REPORT")
          PWA=$(jq '((.categories.pwa.score // 0) * 100 | round)' "$REPORT")

          badge() { local s=$1; if [ "$s" -ge 90 ]; then echo "🟢"; elif [ "$s" -ge 70 ]; then echo "🟡"; else echo "🔴"; fi; }

          FAIL=false
          [ "$PERF" -lt 80 ] && FAIL=true
          [ "$A11Y" -lt 90 ] && FAIL=true

          if [ "$FAIL" = true ]; then
            STATUS="❌ Below threshold"
          else
            STATUS="✅ All thresholds met"
          fi

          cat > /tmp/lh-comment.md << MDEOF
          ## Lighthouse Report — ${STATUS}

          | Category | Score | |
          |---|---:|:---:|
          | Performance | ${PERF} | $(badge $PERF) |
          | Accessibility | ${A11Y} | $(badge $A11Y) |
          | Best Practices | ${BP} | $(badge $BP) |
          | SEO | ${SEO} | $(badge $SEO) |
          | PWA | ${PWA} | $(badge $PWA) |

          > Thresholds: Performance ≥ 80 (warn), Accessibility ≥ 90 (fail). [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          MDEOF

          echo "fail=${FAIL}" >> "$GITHUB_OUTPUT"

      - name: Post Lighthouse comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-report
          path: /tmp/lh-comment.md

      - name: Fail if accessibility below threshold
        if: steps.report.outputs.fail == 'true'
        run: |
          echo "Lighthouse scores below threshold — see PR comment for details."
          exit 1
