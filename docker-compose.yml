services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ecoride:ecoride@postgres:5432/ecoride
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ecoride
      POSTGRES_PASSWORD: ecoride
      POSTGRES_DB: ecoride
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoride"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
